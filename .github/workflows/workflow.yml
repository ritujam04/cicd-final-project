
name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: pip install flake8 pytest

    - name: Lint code
      run: flake8 .

    - name: Run tests
      run: pytest
